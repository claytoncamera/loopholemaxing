name: BTC Ledger Resolve & Metrics

on:
  schedule:
    # Every hour at :07 to avoid the top-of-hour API rush.
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve open forecasts and refresh accuracy.json
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # `safe_push` emits pushed=true|false; the deploy job below uses it
      # to fire Pages only when this run actually advanced origin/main.
      pushed: ${{ steps.commit.outputs.pushed }}
      # See btc-data-snapshot.yml for the rationale behind pushed_sha:
      # the called pages.yml uses it to assert the live tip of main
      # contains our commit before uploading.
      pushed_sha: ${{ steps.commit.outputs.pushed_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run unit tests
        run: |
          cd btc-brain/ledger
          python tests/test_ledger.py
          python tests/test_schedule_forecasts.py
          python tests/test_edge_upgrade.py

      - name: Resolve due forecasts
        run: |
          python btc-brain/ledger/scripts/resolve.py \
            --root btc-brain/ledger/data \
          | tee /tmp/resolve.json

      - name: Rebuild accuracy.json (metrics v0.2)
        run: |
          python btc-brain/ledger/scripts/metrics.py \
            --root btc-brain/ledger/data \
            --out  btc-brain/ledger/public/accuracy.json

      - name: Hunt edges (continuous improvement report)
        run: |
          python btc-brain/ledger/scripts/edge_hunter.py \
            --root btc-brain/ledger/data \
            --out  btc-brain/ledger/public/edge_report.json

      - name: Emit paper signal.json (24h only)
        run: |
          python btc-brain/ledger/scripts/emit_signal.py \
            --root btc-brain/ledger/data \
            --accuracy btc-brain/ledger/public/accuracy.json \
            --out btc-brain/ledger/public/signal.json \
            --horizons 24h

      - name: Commit ledger updates
        id: commit
        # See .github/scripts/safe_push.sh — handles non-fast-forward
        # races against the issuance and snapshot workflows.
        run: |
          git config user.name  "btc-brain-bot"
          git config user.email "btc-brain-bot@users.noreply.github.com"
          git add btc-brain/ledger/data/resolutions.jsonl \
                  btc-brain/ledger/public/accuracy.json \
                  btc-brain/ledger/public/edge_report.json \
                  btc-brain/ledger/public/signal.json
          .github/scripts/safe_push.sh \
            "chore(ledger): resolve + edge hunt + signal refresh"

  # Bot commits made via GITHUB_TOKEN do NOT trigger the push-based
  # `pages.yml` workflow, so we explicitly invoke the reusable Pages
  # deploy whenever this run actually pushed new artifacts.
  deploy-pages:
    name: Deploy refreshed artifacts to GitHub Pages
    needs: resolve
    if: needs.resolve.outputs.pushed == 'true'
    uses: ./.github/workflows/pages.yml
    with:
      expected_sha: ${{ needs.resolve.outputs.pushed_sha }}
    permissions:
      contents: read
      pages: write
      id-token: write
