name: BTC Ledger Resolve & Metrics

on:
  schedule:
    # Every hour at :07 to avoid the top-of-hour API rush.
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve open forecasts and refresh accuracy.json
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # `safe_push` emits pushed=true|false; the deploy job below uses it
      # to fire Pages only when this run actually advanced origin/main.
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run unit tests
        run: |
          cd btc-brain/ledger
          python tests/test_ledger.py

      - name: Resolve due forecasts
        run: |
          python btc-brain/ledger/scripts/resolve.py \
            --root btc-brain/ledger/data \
          | tee /tmp/resolve.json

      - name: Rebuild accuracy.json
        run: |
          python btc-brain/ledger/scripts/metrics.py \
            --root btc-brain/ledger/data \
            --out  btc-brain/ledger/public/accuracy.json

      - name: Commit ledger updates
        id: commit
        # See .github/scripts/safe_push.sh — handles non-fast-forward
        # races against the issuance and snapshot workflows.
        run: |
          git config user.name  "btc-brain-bot"
          git config user.email "btc-brain-bot@users.noreply.github.com"
          git add btc-brain/ledger/data/resolutions.jsonl \
                  btc-brain/ledger/public/accuracy.json
          .github/scripts/safe_push.sh \
            "chore(ledger): resolve due forecasts + refresh accuracy.json"

  # Bot commits made via GITHUB_TOKEN do NOT trigger the push-based
  # `pages.yml` workflow, so we explicitly invoke the reusable Pages
  # deploy whenever this run actually pushed new artifacts.
  deploy-pages:
    name: Deploy refreshed artifacts to GitHub Pages
    needs: resolve
    if: needs.resolve.outputs.pushed == 'true'
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
